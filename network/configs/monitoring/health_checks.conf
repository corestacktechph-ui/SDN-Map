# =============================================================================
# Network Health Check Configuration
# Defines monitoring intervals, thresholds, and alerting rules.
# =============================================================================

[general]
monitor_interval = 30
diagnostic_interval = 60
log_retention_days = 7
results_dir = /app/network/results/diagnostics

[thresholds]
icmp_loss_threshold = 20.0
icmp_latency_threshold_ms = 100.0
tcp_throughput_threshold_mbps = 100.0
vrrp_advert_interval = 1
vrrp_master_down_interval = 3
dhcp_lease_warn_threshold = 10
consecutive_failure_limit = 5

[checks]
core_reachability = true
distribution_reachability = true
server_reachability = true
vlan_gateway_check = true
dhcp_service_check = true
vrrp_pid_check = true
link_redundancy_check = true
ospf_status_check = true

[recovery]
enabled = true
max_attempts = 3
restart_delay_seconds = 2
escalate_after_failures = 3
auto_dhcp_restart = true
auto_vrrp_restart = true
auto_ovs_restart = true

[alerting]
log_alerts = true
console_alerts = true
alert_on_recovery = true
min_severity = WARNING
