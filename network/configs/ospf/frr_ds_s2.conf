! =============================================================================
! FRR Configuration - DS_S2 (Distribution Switch Services 2)
! Router ID: 6.6.6.2
! OSPF Area 40 — Services Block (Backup)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_S2
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface ds2-peer
 ip address 172.16.4.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 10
!
interface ds2-cs1
 ip address 172.16.4.14/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface ds2-cs2
 ip address 172.16.4.18/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 30
!
interface vlan91
 ip address 10.3.0.12/28
!
interface vlan92
 ip address 10.3.0.28/28
!
interface vlan93
 ip address 10.3.0.44/28
!
interface vlan94
 ip address 10.3.0.60/28
!

router ospf
 ospf router-id 6.6.6.2
 redistribute connected
 network 172.16.4.0/30 area 0.0.0.40
 network 172.16.4.12/30 area 0.0.0.40
 network 172.16.4.16/30 area 0.0.0.40
 network 10.3.0.0/28 area 0.0.0.40
 network 10.3.0.16/28 area 0.0.0.40
 network 10.3.0.32/28 area 0.0.0.40
 network 10.3.0.48/28 area 0.0.0.40
 passive-interface vlan91
 passive-interface vlan92
 passive-interface vlan93
 passive-interface vlan94
!

line vty
!
