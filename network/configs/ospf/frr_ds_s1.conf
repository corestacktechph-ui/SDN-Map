! =============================================================================
! FRR Configuration - DS_S1 (Distribution Switch Services 1)
! Router ID: 6.6.6.1
! OSPF Area 40 — Services Block (VLANs 91, 92, 93, 94)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_S1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface ds1-peer
 ip address 172.16.4.1/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 10
!
interface ds1-cs1
 ip address 172.16.4.6/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface ds1-cs2
 ip address 172.16.4.10/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 30
!
interface vlan91
 ip address 10.3.0.13/28
!
interface vlan92
 ip address 10.3.0.29/28
!
interface vlan93
 ip address 10.3.0.45/28
!
interface vlan94
 ip address 10.3.0.61/28
!

router ospf
 ospf router-id 6.6.6.1
 redistribute connected
 network 172.16.4.0/30 area 0.0.0.40
 network 172.16.4.4/30 area 0.0.0.40
 network 172.16.4.8/30 area 0.0.0.40
 network 10.3.0.0/28 area 0.0.0.40
 network 10.3.0.16/28 area 0.0.0.40
 network 10.3.0.32/28 area 0.0.0.40
 network 10.3.0.48/28 area 0.0.0.40
 passive-interface vlan91
 passive-interface vlan92
 passive-interface vlan93
 passive-interface vlan94
!

line vty
!
