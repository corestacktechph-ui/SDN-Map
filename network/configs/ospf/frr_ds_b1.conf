! =============================================================================
! FRR Configuration - DS_B1 (Distribution Switch B1)
! Router ID: 4.4.4.1
! OSPF Area 20 — Block B (VLANs 20, 30, 120)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_B1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface db1-peer
 ip address 172.16.2.1/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 10
!
interface db1-cs1
 ip address 172.16.2.6/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 20
!
interface db1-cs2
 ip address 172.16.2.10/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 30
!
interface vlan20
 ip address 10.1.7.252/22
!
interface vlan30
 ip address 10.1.11.252/22
!
interface vlan120
 ip address 10.2.1.252/24
!

router ospf
 ospf router-id 4.4.4.1
 redistribute connected
 network 172.16.2.0/30 area 0.0.0.20
 network 172.16.2.4/30 area 0.0.0.20
 network 172.16.2.8/30 area 0.0.0.20
 network 10.1.4.0/22 area 0.0.0.20
 network 10.1.8.0/22 area 0.0.0.20
 network 10.2.1.0/24 area 0.0.0.20
 passive-interface vlan20
 passive-interface vlan30
 passive-interface vlan120
!

line vty
!
