! =============================================================================
! FRR Configuration - DS_C2 (Distribution Switch C2)
! Router ID: 5.5.5.2
! OSPF Area 30 — Block C (Backup)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_C2
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface dc2-peer
 ip address 172.16.3.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 10
!
interface dc2-cs1
 ip address 172.16.3.14/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 20
!
interface dc2-cs2
 ip address 172.16.3.18/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 30
!
interface vlan50
 ip address 10.1.19.253/22
!
interface vlan60
 ip address 10.1.23.253/22
!
interface vlan130
 ip address 10.2.2.253/24
!

router ospf
 ospf router-id 5.5.5.2
 redistribute connected
 network 172.16.3.0/30 area 0.0.0.30
 network 172.16.3.12/30 area 0.0.0.30
 network 172.16.3.16/30 area 0.0.0.30
 network 10.1.16.0/22 area 0.0.0.30
 network 10.1.20.0/22 area 0.0.0.30
 network 10.2.2.0/24 area 0.0.0.30
 passive-interface vlan50
 passive-interface vlan60
 passive-interface vlan130
!

line vty
!
