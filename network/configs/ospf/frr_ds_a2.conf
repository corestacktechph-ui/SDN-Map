! =============================================================================
! FRR Configuration - DS_A2 (Distribution Switch A2)
! Router ID: 3.3.3.2
! OSPF Area 10 — Block A (Backup)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_A2
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface da2-peer
 ip address 172.16.1.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 10
!
interface da2-cs1
 ip address 172.16.1.14/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface da2-cs2
 ip address 172.16.1.18/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 30
!
interface vlan10
 ip address 10.1.3.253/22
!
interface vlan40
 ip address 10.1.15.253/22
!
interface vlan110
 ip address 10.2.0.253/24
!

router ospf
 ospf router-id 3.3.3.2
 redistribute connected
 network 172.16.1.0/30 area 0.0.0.10
 network 172.16.1.12/30 area 0.0.0.10
 network 172.16.1.16/30 area 0.0.0.10
 network 10.1.0.0/22 area 0.0.0.10
 network 10.1.12.0/22 area 0.0.0.10
 network 10.2.0.0/24 area 0.0.0.10
 passive-interface vlan10
 passive-interface vlan40
 passive-interface vlan110
!

line vty
!
