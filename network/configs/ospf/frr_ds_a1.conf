! =============================================================================
! FRR Configuration - DS_A1 (Distribution Switch A1)
! Router ID: 3.3.3.1
! OSPF Area 10 — Block A (VLANs 10, 40, 110)
! =============================================================================

frr version 8.5
frr defaults traditional
hostname DS_A1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

! ─── Interface Configuration ───
interface da1-peer
 description Peer link to DS_A2
 ip address 172.16.1.1/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 10
!
interface da1-cs1
 description Uplink to CS1
 ip address 172.16.1.6/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface da1-cs2
 description Redundant uplink to CS2
 ip address 172.16.1.10/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 30
!
! VLAN SVIs (Switched Virtual Interfaces)
interface vlan10
 description VLAN 10 - Finance (10.1.0.0/22)
 ip address 10.1.3.252/22
!
interface vlan40
 description VLAN 40 - Compliance (10.1.12.0/22)
 ip address 10.1.15.252/22
!
interface vlan110
 description VLAN 110 - Guest A (10.2.0.0/24)
 ip address 10.2.0.252/24
!

! ─── OSPF Configuration ───
router ospf
 ospf router-id 3.3.3.1
 redistribute connected
 !
 ! Peer link and uplinks
 network 172.16.1.0/30 area 0.0.0.10
 network 172.16.1.4/30 area 0.0.0.10
 network 172.16.1.8/30 area 0.0.0.10
 !
 ! VLAN subnets advertised into OSPF
 network 10.1.0.0/22 area 0.0.0.10
 network 10.1.12.0/22 area 0.0.0.10
 network 10.2.0.0/24 area 0.0.0.10
 !
 ! VLAN interfaces are passive (no OSPF hellos to hosts)
 passive-interface vlan10
 passive-interface vlan40
 passive-interface vlan110
!

line vty
!
