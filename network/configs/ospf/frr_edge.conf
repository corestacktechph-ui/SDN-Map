! =============================================================================
! FRR Configuration - EDGE Router
! Router ID: 7.7.7.7
! OSPF Area 0 (Backbone) — Internet gateway
! Originates default route into OSPF
! =============================================================================

frr version 8.5
frr defaults traditional
hostname EDGE
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

interface edge-cs1
 ip address 172.16.255.1/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface edge-cs2
 ip address 172.16.255.5/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface edge-isp
 ip address 198.51.100.1/24
 description WAN interface to ISP
!

router ospf
 ospf router-id 7.7.7.7
 !
 ! Advertise default route to internal network
 default-information originate always
 !
 network 172.16.255.0/30 area 0.0.0.0
 network 172.16.255.4/30 area 0.0.0.0
 !
 passive-interface edge-isp
!

! Default route to ISP
ip route 0.0.0.0/0 198.51.100.254

line vty
!
