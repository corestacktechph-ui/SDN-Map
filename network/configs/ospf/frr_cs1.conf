! =============================================================================
! FRR Configuration - CS1 (Core Switch 1)
! Router ID: 1.1.1.1
! OSPF Area 0 (Backbone) — all core-to-distribution and core-to-edge links
! Redistributes connected subnets into OSPF
! =============================================================================

frr version 8.5
frr defaults traditional
hostname CS1
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

! ─── Interface Configuration ───
interface cs1-cs2
 ip address 172.16.0.1/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface cs1-da1
 ip address 172.16.1.5/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface cs1-da2
 ip address 172.16.1.13/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface cs1-db1
 ip address 172.16.2.5/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 20
!
interface cs1-db2
 ip address 172.16.2.13/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 20
!
interface cs1-dc1
 ip address 172.16.3.5/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 20
!
interface cs1-dc2
 ip address 172.16.3.13/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 20
!
interface cs1-ds1
 ip address 172.16.4.5/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface cs1-ds2
 ip address 172.16.4.13/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface cs1-edge
 ip address 172.16.255.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface mgmt
 ip address 10.0.0.252/24
!

! ─── OSPF Configuration ───
router ospf
 ospf router-id 1.1.1.1
 redistribute connected
 !
 ! Area 0 — Backbone (core interconnect + edge)
 network 172.16.0.0/30 area 0.0.0.0
 network 172.16.255.0/30 area 0.0.0.0
 network 10.0.0.0/24 area 0.0.0.0
 !
 ! Area 10 — Block A
 network 172.16.1.4/30 area 0.0.0.10
 network 172.16.1.12/30 area 0.0.0.10
 !
 ! Area 20 — Block B
 network 172.16.2.4/30 area 0.0.0.20
 network 172.16.2.12/30 area 0.0.0.20
 !
 ! Area 30 — Block C
 network 172.16.3.4/30 area 0.0.0.30
 network 172.16.3.12/30 area 0.0.0.30
 !
 ! Area 40 — Services
 network 172.16.4.4/30 area 0.0.0.40
 network 172.16.4.12/30 area 0.0.0.40
 !
 passive-interface mgmt
!

line vty
!
