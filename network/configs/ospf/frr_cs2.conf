! =============================================================================
! FRR Configuration - CS2 (Core Switch 2)
! Router ID: 2.2.2.2
! OSPF Area 0 (Backbone) — backup core paths
! =============================================================================

frr version 8.5
frr defaults traditional
hostname CS2
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config

! ─── Interface Configuration ───
interface cs2-cs1
 ip address 172.16.0.2/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface cs2-da1
 ip address 172.16.1.9/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface cs2-da2
 ip address 172.16.1.17/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.10
 ip ospf cost 20
!
interface cs2-db1
 ip address 172.16.2.9/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 20
!
interface cs2-db2
 ip address 172.16.2.17/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.20
 ip ospf cost 20
!
interface cs2-dc1
 ip address 172.16.3.9/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 20
!
interface cs2-dc2
 ip address 172.16.3.17/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.30
 ip ospf cost 20
!
interface cs2-ds1
 ip address 172.16.4.9/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface cs2-ds2
 ip address 172.16.4.17/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.40
 ip ospf cost 20
!
interface cs2-edge
 ip address 172.16.255.6/30
 ip ospf network point-to-point
 ip ospf area 0.0.0.0
 ip ospf cost 10
!
interface mgmt
 ip address 10.0.0.253/24
!

! ─── OSPF Configuration ───
router ospf
 ospf router-id 2.2.2.2
 redistribute connected
 !
 network 172.16.0.0/30 area 0.0.0.0
 network 172.16.255.4/30 area 0.0.0.0
 network 10.0.0.0/24 area 0.0.0.0
 !
 network 172.16.1.8/30 area 0.0.0.10
 network 172.16.1.16/30 area 0.0.0.10
 !
 network 172.16.2.8/30 area 0.0.0.20
 network 172.16.2.16/30 area 0.0.0.20
 !
 network 172.16.3.8/30 area 0.0.0.30
 network 172.16.3.16/30 area 0.0.0.30
 !
 network 172.16.4.8/30 area 0.0.0.40
 network 172.16.4.16/30 area 0.0.0.40
 !
 passive-interface mgmt
!

line vty
!
