# =============================================================================
# Keepalived VRRP Configuration - Distribution Layer Master Template
# Used for: DS_A1, DS_B1, DS_C1, DS_S1
# Per-block VRRP with VLAN-specific virtual IPs
# =============================================================================

global_defs {
    router_id DIST_MASTER
    vrrp_skip_check_adv_addr
    vrrp_strict
    vrrp_garp_interval 0
    vrrp_gna_interval 0

    # Consistent PID file location per distribution switch
    vrrp_pid_file /var/run/keepalived_dist_${INSTANCE}.pid
}

# =============================================================================
# Block A Distribution VRRP (DS_A1 - Master)
# VLAN 10 - User Network A
# Virtual IP: 10.0.10.1
# =============================================================================
vrrp_instance VI_BLOCK_A {
    state MASTER
    interface DS_A1-eth0
    virtual_router_id 10
    priority 200
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_block_a_vrrp
    }

    virtual_ipaddress {
        10.0.10.1/24 dev DS_A1-eth0
    }

    track_interface {
        DS_A1-eth0
        DS_A1-eth1
        DS_A1-eth2
    }

    track_script {
        check_dist_health
    }

    notify_master /etc/keepalived/notify_master.sh
    notify_backup /etc/keepalived/notify_backup.sh
    notify_fault /etc/keepalived/notify_fault.sh
}

