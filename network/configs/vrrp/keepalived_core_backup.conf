# =============================================================================
# Keepalived VRRP Configuration - Core Layer Backup (CS2)
# Virtual Router: 10.0.255.1
# Priority: 100 (Backup)
# =============================================================================

global_defs {
    notification_email {
        admin@amira.capstone.local
    }
    notification_email_from vrrp@amira.capstone.local
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
    router_id CORE_BACKUP
    vrrp_skip_check_adv_addr
    vrrp_strict
    vrrp_garp_interval 0
    vrrp_gna_interval 0

    # Consistent PID file location
    vrrp_pid_file /var/run/keepalived_core.pid
    vrrp_check_unicast_src
}

vrrp_instance VI_CORE {
    state BACKUP
    interface CS2-eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_core_vrrp
    }

    virtual_ipaddress {
        10.0.255.1/24 dev CS2-eth0
    }

    track_interface {
        CS2-eth0
        CS2-eth1
        CS2-eth2
        CS2-eth3
        CS2-eth4
        CS2-eth5
        CS2-eth6
        CS2-eth7
        CS2-eth8
        CS2-eth9
    }

    track_script {
        check_core_health
    }

    notify_master /etc/keepalived/notify_master.sh
    notify_backup /etc/keepalived/notify_backup.sh
    notify_fault /etc/keepalived/notify_fault.sh
}

vrrp_script check_core_health {
    script "/etc/keepalived/check_core_health.sh"
    interval 2
    timeout 2
    fall 2
    rise 2
}

vrrp_instance VI_CORE_OSPF {
    state BACKUP
    interface CS2-eth0
    virtual_router_id 52
    priority 100
    advert_int 2
    authentication {
        auth_type PASS
        auth_pass amira_ospf_vrrp
    }
    virtual_ipaddress {
        10.0.255.2/24 dev CS2-eth0
    }
}
