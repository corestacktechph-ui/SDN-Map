# =============================================================================
# Keepalived VRRP Configuration - Core Layer Backup (CS2)
# CS2 = BACKUP for core VIP
# =============================================================================

global_defs {
    notification_email {
        admin@amira.capstone.local
    }
    notification_email_from vrrp@amira.capstone.local
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
    router_id CS2_CORE_BACKUP
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 0
    vrrp_gna_interval 0
}

# Core backbone VIP — backup
vrrp_instance VI_CORE_BACKBONE {
    state BACKUP
    interface cs2-cs1
    virtual_router_id 1
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_core
    }
    virtual_ipaddress {
        172.16.0.3/30 dev cs2-cs1
    }
    track_interface {
        cs2-da1
        cs2-da2
        cs2-db1
        cs2-db2
        cs2-dc1
        cs2-dc2
        cs2-ds1
        cs2-ds2
        cs2-edge
    }
    track_script {
        check_core_health
    }
}

# Management VLAN 5 gateway (10.0.0.254) — backup
vrrp_instance VI_MGMT {
    state BACKUP
    interface mgmt
    virtual_router_id 5
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_mgmt
    }
    virtual_ipaddress {
        10.0.0.254/24 dev mgmt
    }
}

vrrp_script check_core_health {
    script "/etc/keepalived/check_core_health.sh"
    interval 2
    timeout 2
    fall 2
    rise 2
}
