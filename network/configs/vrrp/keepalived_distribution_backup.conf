# =============================================================================
# Keepalived VRRP Configuration - Distribution Layer Backups
# Per-VLAN gateway redundancy
#
# DS_A2 = BACKUP for VLANs 10, 40, 110 (Block A)
# DS_B2 = BACKUP for VLANs 20, 30, 120 (Block B)
# DS_C2 = BACKUP for VLANs 50, 60, 130 (Block C)
# DS_S2 = BACKUP for VLANs 91, 92, 93, 94 (Services)
# =============================================================================

global_defs {
    router_id DIST_BACKUP
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 0
    vrrp_gna_interval 0
}

# =============================================================================
# BLOCK A — DS_A2 (Backup)
# =============================================================================

# VLAN 10 — Finance (gateway 10.1.3.254)
vrrp_instance VI_VLAN10 {
    state BACKUP
    interface vlan10
    virtual_router_id 10
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_v10
    }
    virtual_ipaddress {
        10.1.3.254/22 dev vlan10
    }
    track_interface {
        da2-cs1
        da2-cs2
        da2-peer
    }
}

