# =============================================================================
# Keepalived VRRP Configuration - Distribution Layer Backup Template
# Used for: DS_A2, DS_B2, DS_C2, DS_S2
# =============================================================================

global_defs {
    router_id DIST_BACKUP
    vrrp_skip_check_adv_addr
    vrrp_strict
    vrrp_garp_interval 0
    vrrp_gna_interval 0

    # Consistent PID file location per distribution switch
    vrrp_pid_file /var/run/keepalived_dist_${INSTANCE}.pid
}

# =============================================================================
# Block A Distribution VRRP Backup (DS_A2)
# =============================================================================
vrrp_instance VI_BLOCK_A {
    state BACKUP
    interface DS_A2-eth0
    virtual_router_id 10
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_block_a_vrrp
    }

    virtual_ipaddress {
        10.0.10.1/24 dev DS_A2-eth0
    }

    track_interface {
        DS_A2-eth0
        DS_A2-eth1
        DS_A2-eth2
    }

    track_script {
        check_dist_health
    }

    notify_master /etc/keepalived/notify_master.sh
    notify_backup /etc/keepalived/notify_backup.sh
    notify_fault /etc/keepalived/notify_fault.sh
}

