# =============================================================================
# Keepalived VRRP Configuration - Core Layer Master (CS1)
# OSPF backbone gateway redundancy
# CS1 = MASTER for core VIP
# =============================================================================

global_defs {
    notification_email {
        admin@amira.capstone.local
    }
    notification_email_from vrrp@amira.capstone.local
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
    router_id CS1_CORE_MASTER
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 0
    vrrp_gna_interval 0
}

# Core backbone VIP — used as next-hop for inter-area routing
vrrp_instance VI_CORE_BACKBONE {
    state MASTER
    interface cs1-cs2
    virtual_router_id 1
    priority 200
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_core
    }
    virtual_ipaddress {
        172.16.0.3/30 dev cs1-cs2
    }
    track_interface {
        cs1-da1
        cs1-da2
        cs1-db1
        cs1-db2
        cs1-dc1
        cs1-dc2
        cs1-ds1
        cs1-ds2
        cs1-edge
    }
    track_script {
        check_core_health
    }
}

# Management VLAN 5 gateway (10.0.0.254)
vrrp_instance VI_MGMT {
    state MASTER
    interface mgmt
    virtual_router_id 5
    priority 200
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_mgmt
    }
    virtual_ipaddress {
        10.0.0.254/24 dev mgmt
    }
}

vrrp_script check_core_health {
    script "/etc/keepalived/check_core_health.sh"
    interval 2
    timeout 2
    fall 2
    rise 2
}
