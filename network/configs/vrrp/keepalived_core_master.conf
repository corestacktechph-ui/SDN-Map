# =============================================================================
# Keepalived VRRP Configuration - Core Layer Master (CS1)
# Virtual Router: 10.0.255.1
# Priority: 200 (Master)
# Used for core layer gateway redundancy
# =============================================================================

global_defs {
    notification_email {
        admin@amira.capstone.local
    }
    notification_email_from vrrp@amira.capstone.local
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
    router_id CORE_MASTER
    vrrp_skip_check_adv_addr
    vrrp_strict
    vrrp_garp_interval 0
    vrrp_gna_interval 0

    # Consistent PID file location
    vrrp_pid_file /var/run/keepalived_core.pid
    vrrp_check_unicast_src
}

# Core Layer VRRP instance
vrrp_instance VI_CORE {
    state MASTER
    interface CS1-eth0
    virtual_router_id 51
    priority 200
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass amira_core_vrrp
    }

    # Virtual IP for core layer gateway
    virtual_ipaddress {
        10.0.255.1/24 dev CS1-eth0
    }

    # Track interfaces for failover
    track_interface {
        CS1-eth0
        CS1-eth1
        CS1-eth2
        CS1-eth3
        CS1-eth4
        CS1-eth5
        CS1-eth6
        CS1-eth7
        CS1-eth8
        CS1-eth9
    }

    # Health check scripts
    track_script {
        check_core_health
    }

    # Notify scripts
    notify_master /etc/keepalived/notify_master.sh
    notify_backup /etc/keepalived/notify_backup.sh
    notify_fault /etc/keepalived/notify_fault.sh
}

# Health check script
vrrp_script check_core_health {
    script "/etc/keepalived/check_core_health.sh"
    interval 2
    timeout 2
    fall 2
    rise 2
}

# Core Layer OSPF instance (pseudo-VRRP for OSPF adjacency tracking)
vrrp_instance VI_CORE_OSPF {
    state MASTER
    interface CS1-eth0
    virtual_router_id 52
    priority 200
    advert_int 2
    authentication {
        auth_type PASS
        auth_pass amira_ospf_vrrp
    }
    virtual_ipaddress {
        10.0.255.2/24 dev CS1-eth0
    }
}
