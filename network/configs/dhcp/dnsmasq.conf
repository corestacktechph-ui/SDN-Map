# =============================================================================
# Dnsmasq DHCP Server Configuration - Expanded Topology
# Network: 10.1.0.0/16 (User), 10.2.0.0/16 (Guest)
# 27 hosts across 9 VLANs, 6 service servers
# =============================================================================

interface=DHCP-Server-eth0
bind-interfaces
no-resolv
no-poll

domain=amira.capstone.local
local=/amira.capstone.local/
expand-hosts

dhcp-leasefile=/tmp/dhcp_leases.conf
dhcp-lease-max=200
dhcp-authoritative

log-dhcp
log-facility=-

# ===== VLAN 10 - Block A (/22) =====
dhcp-range=10.1.0.51,10.1.3.240,255.255.252.0,24h
dhcp-option=tag:10.1.0.0,option:router,10.1.3.254
dhcp-option=tag:10.1.0.0,option:dns-server,10.1.94.20,8.8.8.8
dhcp-option=tag:10.1.0.0,option:netmask,255.255.252.0
dhcp-option=tag:10.1.0.0,option:domain-search,amira.capstone.local

# ===== VLAN 20 - Block B (/22) =====
