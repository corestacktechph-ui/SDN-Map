version: '3.8'

services:
  # Traditional Network Simulation
  mininet-traditional:
    image: iwaseyusuke/mininet:latest
    container_name: amira-traditional-network
    privileged: true
    network_mode: host
    volumes:
      - ./scripts:/workspace/scripts
      - ./network:/workspace/network
      - ./network/results:/workspace/results
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq dnsmasq iproute2 iputils-ping iperf3 python3-pip &&
        pip3 install -q matplotlib numpy &&
        echo 'Traditional Network Ready. Run: python3 scripts/mininet/traditional_topology.py' &&
        tail -f /dev/null
      "

  # SDN Network Simulation with Ryu Controller
  mininet-sdn:
    image: iwaseyusuke/mininet:latest
    container_name: amira-sdn-network
    privileged: true
    network_mode: host
    volumes:
      - ./scripts:/workspace/scripts
      - ./network:/workspace/network
      - ./network/results:/workspace/results
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - ryu-controller
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq dnsmasq iproute2 iputils-ping iperf3 python3-pip &&
        pip3 install -q matplotlib numpy &&
        echo 'SDN Network Ready. Run: python3 scripts/mininet/sdn_topology.py' &&
        tail -f /dev/null
      "

  # Ryu SDN Controller
  ryu-controller:
    image: python:3.9-slim
    container_name: amira-ryu-controller
    network_mode: host
    volumes:
      - ./scripts/ryu:/root/ryu-apps
    working_dir: /root/ryu-apps
    command: >
      bash -c "
        pip3 install -q 'setuptools<58' 'eventlet==0.30.2' &&
        pip3 install -q ryu &&
        echo 'Starting Ryu SDN Controller on port 6633...' &&
        ryu-manager --observe-links --ofp-tcp-listen-port 6633 sdn_controller.py
      "
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8080), timeout=3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # Network Monitor & Analytics
  network-monitor:
    image: python:3.9-slim
    container_name: amira-network-monitor
    volumes:
      - ./scripts:/workspace/scripts
      - ./network:/workspace/network
      - ./network/results:/workspace/results
    working_dir: /workspace
    command: >
      bash -c "
        pip3 install -q matplotlib numpy pandas &&
        echo 'Network Monitor Ready' &&
        tail -f /dev/null
      "

networks:
  default:
    driver: bridge
